spring.application.name=restfull-web-services

# Enable Data base dev profile
spring.profiles.active=dev

# H2 Database settings
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Set JPA properties
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Enable H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Swagger UI Configuration
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.url=/api-docs

# SpringDoc 2.x is built for Spring Boot 3.x; exclude its HATEOAS bridge which
# references HateoasProperties that no longer exists in Spring Boot 4.x.
# Also exclude the Data REST bridge — we use the HAL Explorer UI only, not full Spring Data REST.
spring.autoconfigure.exclude=\
  org.springdoc.core.configuration.SpringDocHateoasConfiguration,\
  org.springdoc.core.configuration.SpringDocDataRestConfiguration

# Actuator Configuration
# Expose all endpoints over HTTP (default: only 'health' is exposed)
management.endpoints.web.exposure.include=*
# Show full health details (default: never)
management.endpoint.health.show-details=always
# Custom app info (visible at /actuator/info)
management.info.env.enabled=true
info.app.name=Restfull Web Services
info.app.version=0.0.1-SNAPSHOT
