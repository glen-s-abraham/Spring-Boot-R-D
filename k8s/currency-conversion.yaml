apiVersion: apps/v1
kind: Deployment
metadata:
  name: currency-conversion
spec:
  replicas: 1
  selector:
    matchLabels:
      app: currency-conversion
  template:
    metadata:
      labels:
        app: currency-conversion
    spec:
      containers:
        - name: currency-conversion
          image: iss211/currency-conversion:0.0.1-SNAPSHOT
          ports:
            - containerPort: 8100
          env:
            - name: SPRING_CONFIG_IMPORT
              value: "optional:configserver:http://config-server:8888"
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: "http://naming-server:8761/eureka"
---
apiVersion: v1
kind: Service
metadata:
  name: currency-conversion
spec:
  selector:
    app: currency-conversion
  ports:
    - protocol: TCP
      port: 8100
      targetPort: 8100
  type: ClusterIP
